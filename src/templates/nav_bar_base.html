{% load static %}
{% load static %}


<html>

<head>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="author" content="Sarbadal Pal">

    <link rel="shortcut icon" href="{% static 'favicon/favicon_annalect.png' %}"/>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.6.2/css/bulma.css" />
    <link href='https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.10.2/css/all.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.10.2/css/v4-shims.css">


    {% if title %}
        <title>Creative QA App | {{ title }}</title>
    {% else %}
        <title>Creative QA App</title>
    {% endif %}


</head>

<body>

    <style>
        body {
            animation: bgcolor infinite 20s;
        }

        @keyframes bgcolor {
          0%
          {
            background: #f5fffa;
          }
          20%
          {
            background: #e6e6fa;
          }
          40%
          {
            background: #eee8dc;
          }
          60%
          {
            background: #fffafa;
          }
          80%
          {
            background: #eedfcc;
          }
          100%
          {
            background: #f5fffa;
          }
        }


        .avatar {
          vertical-align: middle;
          width: 50px;
          height: 50px;
          border-radius: 50%;
          border: 1px black;
        }
        .customslider {
            width: 75%
        }

    </style>


<!-- <div class="container"> -->

<nav class="navbar is-transparent" role="navigation" aria-label="main navigation" style="background-color: rgba(51, 170, 51, 0);">
    <div class="container">

      <div class="navbar-brand">
        <a class="navbar-item" href="#">
          <img src="{% static 'favicon/logo_text.png' %}" height="100">
          <span></span>
        </a>

        <a role="button" class="navbar-burger burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>

      <div id="navbarBasicExample" class="navbar-menu">

        <div class="navbar-end">
          <div class="navbar-item">
            <div class="buttons">


                {% block hearder %}{% endblock %}


            </div>
          </div>
        </div>
      </div>

  </div>
</nav>

<!-- </div> -->



{% block content %}{% endblock %}

<div class="container">
    <div class="columns">
        <div class="column is-offset-3 is-6">

        <a>
            <h4 style="font-size: 17px; font-family: sans-serif;">Creative QA App | Powered by CoE, Annalect India</h4>
        </a>

        </div>
    </div>
</div>






    <script src="https://code.jquery.com/jquery-3.3.1.min.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <script>
      $(document).ready(function(){
        $('.sidenav').sidenav();
      });

      document.addEventListener('DOMContentLoaded', () => {

      // Get all "navbar-burger" elements
      const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);

      // Check if there are any navbar burgers
      if ($navbarBurgers.length > 0) {

        // Add a click event on each of them
        $navbarBurgers.forEach( el => {
          el.addEventListener('click', () => {

            // Get the target from the "data-target" attribute
            const target = el.dataset.target;
            const $target = document.getElementById(target);

            // Toggle the "is-active" class on both the "navbar-burger" and the "navbar-menu"
            el.classList.toggle('is-active');
            $target.classList.toggle('is-active');

          });
        });
      }

    });
    </script>

</body>

</html>
